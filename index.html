<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Naga Krishna Kovelamudi | Data Engineer & AI Architect</title>
  <meta name="description" content="Data Engineer with 5+ years of experience in AWS, Azure, GCP, Spark, Airflow, and AI/ML. Portfolio showcasing data engineering, RAG systems, and cloud architecture projects." />
  <meta property="og:title" content="Naga Krishna Kovelamudi — Data Engineer & AI Architect" />
  <meta property="og:description" content="5+ years building intelligent data systems across AWS, Azure & GCP. Explore my projects, skills, and experience." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    /* ══ RESET ══ */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }

    /* ══ THEME TOKENS ══ */
    :root,
    [data-theme="dark"] {
      --bg-primary: #08080f;
      --bg-secondary: #0e0e18;
      --bg-card: #131320;
      --bg-card-hover: #1a1a2e;
      --text-primary: #f0ece4;
      --text-secondary: #8a8580;
      --text-tertiary: #5a5550;
      --border-subtle: rgba(255,255,255,0.06);
      --border-accent: rgba(212,168,83,0.12);
      --accent-primary: #d4a853;
      --accent-secondary: #e8c87a;
      --accent-glow: rgba(212,168,83,0.15);
      --accent-glow-strong: rgba(212,168,83,0.35);
      --nav-bg: rgba(8,8,15,0.82);
      --shadow-card: 0 4px 24px rgba(0,0,0,0.3);
      --shadow-card-hover: 0 8px 40px rgba(0,0,0,0.45);
      --font-heading: 'Sora', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }
    [data-theme="light"] {
      --bg-primary: #faf8f3;
      --bg-secondary: #f2efe8;
      --bg-card: #ffffff;
      --bg-card-hover: #f9f7f2;
      --text-primary: #1a1816;
      --text-secondary: #6b6560;
      --text-tertiary: #9a9590;
      --border-subtle: rgba(0,0,0,0.06);
      --border-accent: rgba(180,140,50,0.15);
      --nav-bg: rgba(250,248,243,0.85);
      --shadow-card: 0 4px 20px rgba(0,0,0,0.06);
      --shadow-card-hover: 0 8px 36px rgba(0,0,0,0.1);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-primary);
      color: var(--text-primary);
      line-height: 1.65;
      overflow-x: hidden;
      transition: background 0.5s, color 0.4s;
    }

    /* ══ CUSTOM CURSOR ══ */
    @media (pointer: fine) {
      body, a, button, input, textarea, .project-card, .timeline-card,
      .skill-category-card, .stat-card, .contact-item, .education-card,
      .cert-card, .nav-link, image-slot { cursor: none !important; }
    }
    .cursor-dot, .cursor-ring {
      position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
      will-change: transform; border-radius: 50%;
    }
    .cursor-dot {
      width: 8px; height: 8px;
      background: var(--accent-primary);
      box-shadow: 0 0 12px var(--accent-primary), 0 0 24px var(--accent-glow-strong);
      transition: width 0.2s, height 0.2s, opacity 0.2s;
    }
    .cursor-dot.hovering { width: 0; height: 0; opacity: 0; }
    .cursor-ring {
      width: 36px; height: 36px;
      border: 2px solid var(--accent-primary);
      background: transparent;
      box-shadow: 0 0 12px var(--accent-glow-strong), inset 0 0 8px var(--accent-glow);
      transition: width 0.25s, height 0.25s, background 0.25s, border-color 0.25s;
    }
    .cursor-ring.hovering {
      background: var(--accent-glow);
      border-color: var(--accent-secondary);
    }
    .cursor-ring.clicking::after {
      content: ''; position: absolute; inset: -8px; border-radius: 50%;
      border: 2px solid var(--accent-primary); animation: ringPulse 0.5s ease-out;
    }
    @keyframes ringPulse {
      from { opacity: 1; transform: scale(0.8); }
      to { opacity: 0; transform: scale(1.6); }
    }
    @media (pointer: coarse) { .cursor-dot, .cursor-ring { display: none; } }

    /* ══ LAYOUT ══ */
    .container { max-width: 1140px; margin: 0 auto; padding: 0 24px; }
    .section-padding { padding: 110px 0; position: relative; z-index: 1; }

    /* ══ SECTION TITLES ══ */
    .section-title { margin-bottom: 64px; opacity: 0; transform: translateY(24px); transition: all 0.7s cubic-bezier(0.16,1,0.3,1); }
    .section-title.in-view { opacity: 1; transform: translateY(0); }
    .section-label { font-family: var(--font-mono); font-size: 14px; color: var(--accent-primary); letter-spacing: 2px; display: block; margin-bottom: 12px; }
    .section-title h2 { font-family: var(--font-heading); font-size: clamp(28px, 4vw, 42px); font-weight: 600; letter-spacing: -0.5px; }
    .section-line { width: 48px; height: 3px; background: var(--accent-primary); margin-top: 16px; border-radius: 2px; }
    .section-title[style*="center"] .section-line { margin-left: auto; margin-right: auto; }

    /* ══ BUTTONS ══ */
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-heading); font-size: 14px; font-weight: 500;
      padding: 12px 28px; border-radius: 10px; border: 1.5px solid transparent;
      cursor: pointer; transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      text-decoration: none; white-space: nowrap;
      position: relative; overflow: hidden;
    }
    .btn::before {
      content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%;
      background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,0.18) 50%, transparent 70%);
      transition: left 0.7s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .btn:hover::before { left: 100%; }
    .btn > * { position: relative; z-index: 1; }
    .btn-primary {
      background: var(--accent-primary); color: #0a0a0f; border-color: var(--accent-primary);
      box-shadow: 0 0 0 0 var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px var(--accent-glow-strong), 0 0 40px var(--accent-glow);
    }
    .btn-primary:active { transform: translateY(-1px); }
    .btn-secondary {
      background: transparent; color: var(--text-primary); border-color: var(--border-subtle);
      backdrop-filter: blur(8px);
    }
    .btn-secondary:hover {
      border-color: var(--accent-primary); color: var(--accent-primary);
      transform: translateY(-3px); background: var(--accent-glow);
    }
    .btn-ghost { background: transparent; color: var(--text-secondary); border-color: transparent; }
    .btn-ghost:hover { color: var(--accent-primary); transform: translateY(-2px); }
    .btn-sm { padding: 8px 20px; font-size: 13px; }
    .btn-full { width: 100%; justify-content: center; }

    /* ══ NETWORK / GRID BACKGROUND ══ */
    .static-grid-bg {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
      background-image:
        linear-gradient(rgba(212,168,83,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,168,83,0.04) 1px, transparent 1px);
      background-size: 64px 64px;
    }
    [data-theme="light"] .static-grid-bg {
      background-image:
        linear-gradient(rgba(160,130,60,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(160,130,60,0.05) 1px, transparent 1px);
    }
    .grid-glow {
      position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4;
      background: var(--accent-glow-strong); animation: glowFloat 22s ease-in-out infinite;
    }
    .grid-glow.g1 { width: 360px; height: 360px; top: 5%; left: 12%; }
    .grid-glow.g2 { width: 280px; height: 280px; bottom: 15%; right: 8%; animation-delay: -8s; }
    .grid-glow.g3 { width: 320px; height: 320px; top: 50%; left: 65%; animation-delay: -14s; }
    @keyframes glowFloat {
      0%, 100% { transform: translate(0, 0); }
      33% { transform: translate(40px, -60px); }
      66% { transform: translate(-30px, 40px); }
    }

    .grid-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .aurora-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden; }
    .aurora-blob {
      position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.12;
      animation: auroraFloat 18s ease-in-out infinite;
    }
    .aurora-blob.a1 { width: 500px; height: 500px; background: var(--accent-primary); top: -10%; left: 20%; }
    .aurora-blob.a2 { width: 400px; height: 400px; background: var(--accent-secondary); bottom: 10%; right: 10%; animation-delay: -6s; }
    .aurora-blob.a3 { width: 350px; height: 350px; background: var(--accent-primary); top: 40%; left: 60%; animation-delay: -12s; }
    @keyframes auroraFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, -60px) scale(1.1); }
      66% { transform: translate(-30px, 40px) scale(0.9); }
    }
    .particles-bg { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .particle {
      position: absolute; border-radius: 50%; background: var(--accent-primary); opacity: 0;
      animation: particleFloat linear infinite;
    }
    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(0) scale(0.5); }
      20% { opacity: 0.5; }
      80% { opacity: 0.3; }
      100% { opacity: 0; transform: translateY(-100vh) scale(1); }
    }

    /* ══ SHOOTING STARS ══ */
    .shooting-stars {
      position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
    }
    .shooting-star {
      position: absolute; width: 80px; height: 1px;
      background: linear-gradient(90deg, var(--accent-primary), transparent);
      border-radius: 1px; opacity: 0;
      filter: drop-shadow(0 0 4px var(--accent-primary));
    }
    .shooting-star::before {
      content: ''; position: absolute; right: 0; top: -1px;
      width: 4px; height: 3px; border-radius: 50%;
      background: var(--accent-secondary);
      box-shadow: 0 0 6px 2px var(--accent-primary), 0 0 14px 4px var(--accent-glow-strong);
    }
    .shooting-star:nth-child(1) { top: 8%; left: 70%; width: 100px; animation: shoot1 8s linear infinite 1s; }
    .shooting-star:nth-child(2) { top: 22%; left: 85%; width: 70px; animation: shoot2 11s linear infinite 4s; }
    .shooting-star:nth-child(3) { top: 45%; left: 60%; width: 120px; animation: shoot1 9s linear infinite 7s; }
    .shooting-star:nth-child(4) { top: 65%; left: 90%; width: 60px; animation: shoot2 13s linear infinite 2s; }
    .shooting-star:nth-child(5) { top: 15%; left: 40%; width: 90px; animation: shoot3 10s linear infinite 5s; }
    .shooting-star:nth-child(6) { top: 78%; left: 75%; width: 80px; animation: shoot1 12s linear infinite 9s; }
    .shooting-star:nth-child(7) { top: 35%; left: 95%; width: 110px; animation: shoot3 14s linear infinite 3s; }
    .shooting-star:nth-child(8) { top: 55%; left: 50%; width: 75px; animation: shoot2 10s linear infinite 8s; }
    @keyframes shoot1 {
      0% { transform: translateX(0) translateY(0) rotate(-35deg); opacity: 0; }
      3% { opacity: 1; }
      8% { opacity: 0.8; }
      12% { transform: translateX(-300px) translateY(180px) rotate(-35deg); opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes shoot2 {
      0% { transform: translateX(0) translateY(0) rotate(-25deg); opacity: 0; }
      2% { opacity: 0.9; }
      6% { opacity: 0.7; }
      10% { transform: translateX(-250px) translateY(130px) rotate(-25deg); opacity: 0; }
      100% { opacity: 0; }
    }
    @keyframes shoot3 {
      0% { transform: translateX(0) translateY(0) rotate(-42deg); opacity: 0; }
      2% { opacity: 1; }
      7% { opacity: 0.6; }
      11% { transform: translateX(-350px) translateY(250px) rotate(-42deg); opacity: 0; }
      100% { opacity: 0; }
    }

    /* ══ NAVIGATION ══ */
    .main-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 20px 0; transition: all 0.35s;
    }
    .main-nav.scrolled {
      padding: 12px 0; background: var(--nav-bg); backdrop-filter: blur(20px) saturate(1.4);
      border-bottom: 1px solid var(--border-subtle);
    }
    .nav-inner { max-width: 1140px; margin: 0 auto; padding: 0 24px; display: flex; align-items: center; justify-content: space-between; }
    .nav-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; font-family: var(--font-heading); font-weight: 600; font-size: 18px; color: var(--text-primary); }
    .nav-logo-accent { color: var(--accent-primary); }
    .nav-links { display: flex; align-items: center; gap: 8px; }
    .nav-link {
      font-family: var(--font-heading); font-size: 13px; font-weight: 400; color: var(--text-secondary);
      text-decoration: none; padding: 8px 14px; border-radius: 8px; transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
      position: relative; overflow: hidden;
    }
    .nav-link::before {
      content: ''; position: absolute; inset: 0; border-radius: 8px;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), var(--accent-glow-strong) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.3s;
    }
    .nav-link:hover::before { opacity: 1; }
    .nav-link:hover {
      color: var(--text-primary);
      text-shadow: 0 0 12px var(--accent-glow-strong), 0 0 24px var(--accent-glow);
      transform: translateY(-1px);
    }
    .nav-link.active { color: var(--accent-primary); text-shadow: 0 0 16px var(--accent-glow-strong); }
    .nav-link.active::after {
      content: ''; position: absolute; bottom: 2px; left: 50%; transform: translateX(-50%);
      width: 16px; height: 3px; border-radius: 2px; background: var(--accent-primary);
      box-shadow: 0 0 8px var(--accent-primary), 0 0 20px var(--accent-glow-strong);
      animation: navDotPulse 2s ease-in-out infinite;
    }
    @keyframes navDotPulse {
      0%, 100% { box-shadow: 0 0 8px var(--accent-primary), 0 0 20px var(--accent-glow-strong); }
      50% { box-shadow: 0 0 14px var(--accent-primary), 0 0 36px var(--accent-glow-strong); }
    }

    /* Mobile Nav */
    .nav-hamburger { display: none; background: none; border: none; cursor: pointer; width: 32px; height: 24px; position: relative; z-index: 110; }
    .nav-hamburger span {
      display: block; width: 100%; height: 2px; background: var(--text-primary); position: absolute; left: 0;
      transition: all 0.3s; border-radius: 1px;
    }
    .nav-hamburger span:nth-child(1) { top: 2px; }
    .nav-hamburger span:nth-child(2) { top: 11px; }
    .nav-hamburger span:nth-child(3) { top: 20px; }
    .nav-hamburger.open span:nth-child(1) { top: 11px; transform: rotate(45deg); }
    .nav-hamburger.open span:nth-child(2) { opacity: 0; }
    .nav-hamburger.open span:nth-child(3) { top: 11px; transform: rotate(-45deg); }

    @media (max-width: 768px) {
      .nav-hamburger { display: block; }
      .nav-links {
        position: fixed; inset: 0; background: var(--bg-primary); flex-direction: column;
        justify-content: center; gap: 16px; opacity: 0; pointer-events: none; transition: opacity 0.3s;
      }
      .nav-links.mobile-open { opacity: 1; pointer-events: all; }
      .nav-link { font-size: 20px; padding: 12px 24px; }
    }

    /* ══ HERO ══ */
    .hero-section {
      min-height: 100vh; display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; position: relative; z-index: 1; padding: 120px 24px 60px;
    }
    .hero-content { max-width: 800px; }
    .hero-intro > * {
      opacity: 0; transform: translateY(30px);
      transition: opacity 0.8s cubic-bezier(0.16,1,0.3,1), transform 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .hero-intro.animate > * { opacity: 1; transform: translateY(0); }
    .hero-intro.animate > *:nth-child(1) { transition-delay: 0.1s; }
    .hero-intro.animate > *:nth-child(2) { transition-delay: 0.25s; }
    .hero-intro.animate > *:nth-child(3) { transition-delay: 0.45s; }
    .hero-intro.animate > *:nth-child(4) { transition-delay: 0.6s; }
    .hero-intro.animate > *:nth-child(5) { transition-delay: 0.8s; }

    .hero-greeting {
      display: block; font-family: var(--font-mono); font-size: 15px; color: var(--accent-primary);
      letter-spacing: 3px; text-transform: uppercase; margin-bottom: 16px;
    }
    .hero-name { font-family: var(--font-heading); line-height: 1.1; margin-bottom: 20px; }
    .hero-name-first {
      display: block; font-size: clamp(40px, 7vw, 72px); font-weight: 700; line-height: 1;
      background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary), var(--text-primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-name-mid {
      display: block; font-size: clamp(28px, 5vw, 54px); font-weight: 700; line-height: 1.05; margin-top: 6px;
      background: linear-gradient(135deg, var(--accent-secondary), var(--accent-primary));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero-name-last {
      display: block; font-size: clamp(24px, 3.6vw, 42px); font-weight: 300;
      color: var(--text-secondary); margin-top: 10px; letter-spacing: 0.5px;
    }
    .hero-typed-wrapper { font-family: var(--font-heading); font-size: clamp(18px, 2.5vw, 26px); margin-bottom: 24px; height: 36px; }
    .hero-typed { color: var(--text-primary); font-weight: 400; }
    .typing-cursor { color: var(--accent-primary); animation: blink 1s step-end infinite; font-weight: 300; }
    @keyframes blink { 50% { opacity: 0; } }
    .hero-description {
      font-size: 16px; color: var(--text-secondary); max-width: 560px; margin: 0 auto 36px;
      line-height: 1.7; text-wrap: pretty;
    }
    .hero-cta-group { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .hero-scroll-indicator {
      position: absolute; bottom: 36px; left: 50%; transform: translateX(-50%);
      display: flex; flex-direction: column; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 11px; color: var(--text-tertiary); letter-spacing: 2px; text-transform: uppercase;
    }
    .scroll-arrow { animation: bounce 2s ease-in-out infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(6px); } }

    /* ══ ABOUT ══ */
    .about-grid {
      display: grid; grid-template-columns: 280px 1fr; gap: 56px; align-items: start;
      opacity: 0; transform: translateY(30px); transition: all 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .about-grid.in-view { opacity: 1; transform: translateY(0); }

    .about-photo-wrap { position: sticky; top: 120px; display: flex; flex-direction: column; gap: 16px; align-items: center; }
    .about-photo-frame {
      position: relative; width: 100%; aspect-ratio: 4 / 5; max-width: 260px;
      border-radius: 22px; padding: 8px;
      background: linear-gradient(135deg, var(--accent-primary), transparent 60%, var(--accent-secondary));
    }
    .about-photo-frame::before {
      content: ''; position: absolute; inset: -2px; border-radius: 24px;
      background: linear-gradient(135deg, var(--accent-primary), transparent 50%, var(--accent-secondary));
      opacity: 0.4; filter: blur(20px); z-index: -1;
      animation: photoGlow 4s ease-in-out infinite;
    }
    @keyframes photoGlow { 0%, 100% { opacity: 0.3; } 50% { opacity: 0.6; } }
    .about-photo-frame image-slot {
      width: 100%; height: 100%; display: block;
      background: var(--bg-card);
      --is-empty-color: var(--text-tertiary);
      --is-empty-bg: var(--bg-card);
    }
    .about-photo-deco {
      position: absolute; bottom: -12px; right: -12px; width: 70px; height: 70px;
      border: 2px solid var(--accent-primary); border-radius: 14px;
      opacity: 0.5; z-index: -1;
    }
    .about-badge {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-mono); font-size: 11px; padding: 8px 14px;
      background: var(--accent-glow); border: 1px solid var(--border-accent);
      color: var(--accent-primary); border-radius: 999px; letter-spacing: 1px; text-transform: uppercase;
    }
    .badge-dot {
      width: 7px; height: 7px; border-radius: 50%; background: var(--accent-primary);
      box-shadow: 0 0 0 0 var(--accent-glow-strong); animation: badgePulse 2s ease-in-out infinite;
    }
    @keyframes badgePulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--accent-glow-strong); }
      50% { box-shadow: 0 0 0 8px transparent; }
    }

    .about-text p { color: var(--text-secondary); margin-bottom: 20px; font-size: 15.5px; line-height: 1.75; }
    .about-text strong { color: var(--text-primary); font-weight: 600; }
    .about-stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-top: 32px; }
    .stat-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 12px;
      padding: 20px 12px; text-align: center; transition: all 0.35s;
    }
    .stat-card:hover { border-color: var(--border-accent); transform: translateY(-4px); box-shadow: var(--shadow-card-hover); }
    .stat-number { font-family: var(--font-heading); font-size: 28px; font-weight: 700; color: var(--accent-primary); }
    .stat-label { font-size: 11.5px; color: var(--text-secondary); margin-top: 4px; letter-spacing: 0.3px; }
    @media (max-width: 900px) {
      .about-grid { grid-template-columns: 1fr; gap: 40px; }
      .about-photo-wrap { position: static; max-width: 320px; margin: 0 auto; }
      .about-stats { grid-template-columns: repeat(2, 1fr); }
    }

    /* ══ SKILLS ══ */
    .skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 24px; }
    .skill-category-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px;
      padding: 28px; transition: all 0.6s cubic-bezier(0.16,1,0.3,1);
      opacity: 0; transform: translateY(24px);
    }
    .skill-category-card.in-view { opacity: 1; transform: translateY(0); }
    .skill-category-card:hover { border-color: var(--border-accent); box-shadow: var(--shadow-card-hover); }
    .skill-category-header { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; }
    .skill-category-icon { font-size: 20px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; background: var(--accent-glow); color: var(--accent-primary); border-radius: 10px; font-family: var(--font-mono); }
    .skill-category-name { font-family: var(--font-heading); font-size: 16px; font-weight: 600; }
    .skill-bar-wrapper { margin-bottom: 16px; }
    .skill-bar-wrapper:last-child { margin-bottom: 0; }
    .skill-bar-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .skill-bar-name { font-size: 13.5px; color: var(--text-secondary); }
    .skill-bar-pct { font-family: var(--font-mono); font-size: 12px; color: var(--accent-primary); transition: all 0.6s; }
    .skill-bar-track { height: 6px; background: var(--border-subtle); border-radius: 3px; overflow: hidden; }
    .skill-bar-fill {
      height: 100%; border-radius: 3px; transition: width 1.2s cubic-bezier(0.16,1,0.3,1);
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
    }

    /* ══ EXPERIENCE TIMELINE ══ */
    .timeline { position: relative; padding-left: 40px; }
    .timeline::before { content: ''; position: absolute; left: 14px; top: 0; bottom: 0; width: 2px; background: var(--border-subtle); }
    .timeline-item {
      position: relative; margin-bottom: 40px;
      opacity: 0; transform: translateY(24px); transition: all 0.7s cubic-bezier(0.16,1,0.3,1);
    }
    .timeline-item.in-view { opacity: 1; transform: translateY(0); }
    .timeline-item:last-child { margin-bottom: 0; }
    .timeline-dot {
      position: absolute; left: -33px; top: 24px; width: 12px; height: 12px;
      border-radius: 50%; border: 2.5px solid var(--accent-primary); background: var(--bg-primary);
      z-index: 2; transition: all 0.3s;
    }
    .timeline-item.in-view .timeline-dot { box-shadow: 0 0 0 4px var(--accent-glow); }
    .timeline-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px;
      padding: 32px; transition: all 0.4s cubic-bezier(0.16,1,0.3,1);
    }
    .timeline-card:hover {
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 1px var(--accent-primary), 0 8px 40px rgba(0,0,0,0.45), 0 0 30px var(--accent-glow), inset 0 1px 0 var(--accent-glow);
      transform: translateX(6px);
      background: var(--bg-card-hover);
    }
    .timeline-item:hover .timeline-dot {
      background: var(--accent-primary); transform: scale(1.5);
      box-shadow: 0 0 0 6px var(--accent-glow), 0 0 20px var(--accent-glow-strong);
    }
    .timeline-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .timeline-company { font-family: var(--font-heading); font-size: 20px; font-weight: 600; }
    .timeline-role { font-size: 14px; color: var(--accent-primary); margin-top: 4px; font-weight: 500; }
    .timeline-meta { text-align: right; }
    .timeline-period { display: block; font-family: var(--font-mono); font-size: 13px; color: var(--text-secondary); }
    .timeline-location { font-size: 12px; color: var(--text-tertiary); }
    .timeline-highlights { list-style: none; margin-bottom: 20px; }
    .timeline-highlights li {
      position: relative; padding-left: 18px; margin-bottom: 10px; font-size: 14px;
      color: var(--text-secondary); line-height: 1.65;
    }
    .timeline-highlights li::before { content: '\25B8'; position: absolute; left: 0; color: var(--accent-primary); font-size: 12px; }
    .timeline-tech { display: flex; flex-wrap: wrap; gap: 8px; }
    .tech-tag {
      font-family: var(--font-mono); font-size: 11px; padding: 4px 10px;
      background: var(--accent-glow); color: var(--accent-primary); border-radius: 6px;
      border: 1px solid var(--border-accent); transition: all 0.25s;
    }
    .tech-tag:hover { background: var(--accent-glow-strong); }

    /* ══ EDUCATION ══ */
    .education-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; }
    .education-grid > * { opacity: 0; transform: translateY(24px); transition: all 0.7s cubic-bezier(0.16,1,0.3,1); }
    .education-grid.in-view > * { opacity: 1; transform: translateY(0); }
    .education-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px;
      padding: 36px; text-align: center; transition: all 0.35s;
    }
    .education-card:hover { border-color: var(--border-accent); transform: translateY(-4px); box-shadow: var(--shadow-card-hover); }
    .edu-icon { font-size: 36px; margin-bottom: 16px; }
    .edu-degree { font-family: var(--font-heading); font-size: 18px; font-weight: 600; margin-bottom: 8px; }
    .edu-school { font-size: 15px; color: var(--accent-primary); margin-bottom: 4px; }
    .edu-location { font-size: 13px; color: var(--text-tertiary); }

    /* ══ CERTIFICATIONS ══ */
    .certs-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 24px; }
    .certs-grid > * { opacity: 0; transform: translateY(24px); transition: all 0.7s cubic-bezier(0.16,1,0.3,1); }
    .certs-grid.in-view > * { opacity: 1; transform: translateY(0); }
    .cert-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px;
      padding: 32px; display: flex; align-items: center; gap: 24px; transition: all 0.35s;
    }
    .cert-card:hover { border-color: var(--border-accent); transform: translateY(-4px); box-shadow: var(--shadow-card-hover); }
    .cert-badge {
      position: relative; width: 64px; height: 64px; min-width: 64px;
      border-radius: 50%; border: 2px solid; display: flex; align-items: center; justify-content: center;
    }
    .cert-badge-text { font-family: var(--font-heading); font-size: 18px; font-weight: 700; }
    .cert-badge-ring { position: absolute; inset: -6px; animation: spinSlow 20s linear infinite; }
    @keyframes spinSlow { to { transform: rotate(360deg); } }
    .cert-name { font-family: var(--font-heading); font-size: 16px; font-weight: 600; margin-bottom: 4px; }
    .cert-issuer { font-size: 13px; color: var(--text-secondary); }

    /* ══ PROJECTS ══ */
    .projects-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 24px; }
    .project-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 16px;
      padding: 32px; display: flex; flex-direction: column; transition: all 0.6s cubic-bezier(0.16,1,0.3,1);
      opacity: 0; transform: translateY(24px); position: relative; overflow: hidden;
    }
    .project-card.in-view { opacity: 1; transform: translateY(0); }
    .project-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent-primary), var(--accent-secondary));
      transform: scaleX(0); transform-origin: left; transition: transform 0.4s;
    }
    .project-card:hover::before { transform: scaleX(1); }
    .project-card:hover { border-color: var(--border-accent); box-shadow: var(--shadow-card-hover); transform: translateY(-4px); }
    .project-card-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .project-category { font-family: var(--font-mono); font-size: 11px; color: var(--accent-primary); text-transform: uppercase; letter-spacing: 1px; }
    .project-year { font-family: var(--font-mono); font-size: 12px; color: var(--text-tertiary); }
    .project-title { font-family: var(--font-heading); font-size: 18px; font-weight: 600; margin-bottom: 4px; }
    .project-company { font-size: 13px; color: var(--accent-primary); margin-bottom: 12px; }
    .project-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 20px; flex: 1; }
    .project-tech { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
    .project-links { display: flex; gap: 12px; }
    .project-link {
      display: inline-flex; align-items: center; gap: 8px; font-size: 13px;
      color: var(--text-secondary); text-decoration: none; transition: all 0.3s;
      padding: 8px 14px; border-radius: 8px; border: 1px solid var(--border-subtle);
    }
    .project-link:hover {
      color: var(--accent-primary); border-color: var(--accent-primary);
      background: var(--accent-glow);
    }
    .link-arrow { transition: transform 0.3s; }
    .project-link:hover .link-arrow { transform: translate(3px, -3px); }

    /* ══ CONTACT ══ */
    .contact-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 48px;
      opacity: 0; transform: translateY(24px); transition: all 0.8s cubic-bezier(0.16,1,0.3,1);
    }
    .contact-grid.in-view { opacity: 1; transform: translateY(0); }
    .contact-intro { font-size: 16px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 32px; }
    .contact-details { display: flex; flex-direction: column; gap: 16px; }
    .contact-item {
      display: flex; align-items: center; gap: 16px; text-decoration: none;
      padding: 16px; border-radius: 12px; border: 1px solid var(--border-subtle);
      transition: all 0.3s; background: var(--bg-card);
    }
    .contact-item:hover { border-color: var(--border-accent); transform: translateX(4px); }
    .contact-icon {
      width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
      background: var(--accent-glow); border-radius: 10px; color: var(--accent-primary); flex-shrink: 0;
    }
    .contact-item-label { display: block; font-size: 11px; color: var(--text-tertiary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 2px; }
    .contact-item-value { font-size: 14px; color: var(--text-primary); }

    .contact-form { display: flex; flex-direction: column; gap: 20px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group label { font-family: var(--font-heading); font-size: 13px; font-weight: 500; color: var(--text-secondary); }
    .form-group input,
    .form-group textarea {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 10px;
      padding: 14px 16px; font-family: var(--font-body); font-size: 14px; color: var(--text-primary);
      outline: none; transition: border-color 0.3s; resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus { border-color: var(--accent-primary); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-group input::placeholder,
    .form-group textarea::placeholder { color: var(--text-tertiary); }

    .form-success { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 16px; padding: 48px 24px; }
    .form-success h3 { font-family: var(--font-heading); font-size: 22px; color: var(--accent-primary); }
    .form-success p { color: var(--text-secondary); }

    @media (max-width: 768px) { .contact-grid { grid-template-columns: 1fr; } }

    /* ══ FOOTER ══ */
    .site-footer { padding: 32px 0; border-top: 1px solid var(--border-subtle); position: relative; z-index: 1; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 16px; }
    .footer-copy { font-size: 13px; color: var(--text-tertiary); }
    .footer-links { display: flex; gap: 16px; }
    .footer-links a { color: var(--text-tertiary); transition: color 0.25s; }
    .footer-links a:hover { color: var(--accent-primary); }

    /* ══ TECH MARQUEE ══ */
    .marquee-section {
      padding: 20px 0; overflow: hidden; position: relative; z-index: 1;
      border-top: 1px solid var(--border-subtle); border-bottom: 1px solid var(--border-subtle);
      background: var(--bg-secondary);
    }
    .marquee-track {
      display: flex; gap: 12px; width: max-content;
      animation: marqueeScroll 40s linear infinite;
    }
    .marquee-track:hover { animation-play-state: paused; }
    .marquee-tag {
      display: inline-flex; align-items: center; gap: 8px; padding: 8px 16px;
      border-radius: 999px; background: var(--bg-card); border: 1px solid var(--border-subtle);
      font-family: var(--font-mono); font-size: 12px; color: var(--text-secondary);
      white-space: nowrap; transition: all 0.3s;
    }
    .marquee-tag:hover { border-color: var(--border-accent); color: var(--accent-primary); }
    .marquee-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent-primary); opacity: 0.6; flex-shrink: 0; }
    @keyframes marqueeScroll { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ══ SERVICES ══ */
    .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px; }
    @media (max-width: 900px) { .services-grid { grid-template-columns: 1fr 1fr; } }
    @media (max-width: 600px) { .services-grid { grid-template-columns: 1fr; } }
    .service-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 18px;
      padding: 36px 28px; transition: all 0.45s cubic-bezier(0.16,1,0.3,1);
      opacity: 0; transform: translateY(28px); position: relative; overflow: hidden;
    }
    .service-card.in-view { opacity: 1; transform: translateY(0); }
    .service-card::after {
      content: ''; position: absolute; inset: 0; border-radius: 18px;
      background: radial-gradient(circle at 50% 0%, var(--accent-glow) 0%, transparent 70%);
      opacity: 0; transition: opacity 0.4s; pointer-events: none;
    }
    .service-card:hover { border-color: var(--border-accent); transform: translateY(-6px); box-shadow: var(--shadow-card-hover); }
    .service-card:hover::after { opacity: 1; }
    .service-icon {
      width: 52px; height: 52px; border-radius: 14px; background: var(--accent-glow);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px; margin-bottom: 20px; border: 1px solid var(--border-accent);
      position: relative; z-index: 1;
    }
    .service-title { font-family: var(--font-heading); font-size: 17px; font-weight: 600; margin-bottom: 10px; position: relative; z-index: 1; }
    .service-desc { font-size: 14px; color: var(--text-secondary); line-height: 1.65; margin-bottom: 20px; position: relative; z-index: 1; }
    .service-tags { display: flex; flex-wrap: wrap; gap: 6px; position: relative; z-index: 1; }

    /* ══ TESTIMONIALS ══ */
    .testimonials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 24px; }
    .testimonial-card {
      background: var(--bg-card); border: 1px solid var(--border-subtle); border-radius: 18px;
      padding: 32px; transition: all 0.45s cubic-bezier(0.16,1,0.3,1);
      opacity: 0; transform: translateY(24px); position: relative;
    }
    .testimonial-card.in-view { opacity: 1; transform: translateY(0); }
    .testimonial-card:hover { border-color: var(--border-accent); transform: translateY(-4px); box-shadow: var(--shadow-card-hover); }
    .testimonial-quote { font-size: 52px; color: var(--accent-primary); line-height: 1; margin-bottom: 12px; opacity: 0.5; font-family: Georgia, serif; display: block; }
    .testimonial-text { font-size: 14px; color: var(--text-secondary); line-height: 1.78; margin-bottom: 24px; font-style: italic; }
    .testimonial-author { display: flex; align-items: center; gap: 14px; }
    .testimonial-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent-glow); border: 2px solid var(--border-accent);
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-heading); font-weight: 700; font-size: 14px;
      color: var(--accent-primary); flex-shrink: 0;
    }
    .testimonial-name { font-family: var(--font-heading); font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .testimonial-role { font-size: 12px; color: var(--text-tertiary); }

    /* ══ SIDE DOT NAV ══ */
    .side-nav {
      position: fixed; right: 24px; top: 50%; transform: translateY(-50%);
      z-index: 50; display: flex; flex-direction: column; gap: 10px; align-items: center;
    }
    .side-nav-dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary);
      border: none; cursor: pointer; transition: all 0.3s cubic-bezier(0.16,1,0.3,1);
      padding: 0; position: relative;
    }
    .side-nav-dot.active { background: var(--accent-primary); transform: scale(1.6); box-shadow: 0 0 0 3px var(--accent-glow), 0 0 12px var(--accent-glow-strong); }
    .side-nav-dot:hover:not(.active) { background: var(--accent-secondary); transform: scale(1.35); }
    .side-nav-label {
      position: absolute; right: calc(100% + 14px); top: 50%; transform: translateY(-50%);
      font-family: var(--font-mono); font-size: 10px; color: var(--text-secondary);
      background: var(--bg-card); border: 1px solid var(--border-subtle);
      padding: 4px 10px; border-radius: 6px; white-space: nowrap;
      opacity: 0; pointer-events: none; transition: opacity 0.2s; letter-spacing: 0.5px;
    }
    .side-nav-dot:hover .side-nav-label, .side-nav-dot.active .side-nav-label { opacity: 1; }
    @media (max-width: 1200px) { .side-nav { display: none; } }

    /* ══ ALTERNATING SECTION BG ══ */
    .skills-section,
    .services-section,
    .certifications-section,
    .contact-section { background: var(--bg-secondary); }

    /* ══ RESPONSIVE ══ */
    @media (max-width: 600px) {
      .section-padding { padding: 72px 0; }
      .section-title { margin-bottom: 40px; }
      .skills-grid { grid-template-columns: 1fr; }
      .projects-grid { grid-template-columns: 1fr; }
      .hero-section { padding: 100px 20px 60px; }
      .timeline { padding-left: 28px; }
      .timeline::before { left: 8px; }
      .timeline-dot { left: -25px; }
      .timeline-card { padding: 24px; }
      .timeline-card-header { flex-direction: column; }
      .timeline-meta { text-align: left; }
    }
  </style>
</head>

  <div id="root"></div>

  <script>
    window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
      "theme": "dark",
      "accentColor": "#d4a853",
      "bgEffect": "network"
    }/*EDITMODE-END*/;
  </script>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- image-slot.js (regular script) -->
  <script>
(() => {
  const STATE_FILE = '.image-slots.state.json';
  const MAX_DIM = 1200;
  const ACCEPT = ['image/png', 'image/jpeg', 'image/webp', 'image/avif'];

  const subs = new Set();
  let slots = {};
  const tombstones = new Set();
  let loaded = false;
  let loadP = null;

  function load() {
    if (loadP) return loadP;
    loadP = fetch(STATE_FILE)
      .then((r) => (r.ok ? r.json() : null))
      .then((j) => {
        if (j && typeof j === 'object') {
          const merged = Object.assign({}, j, slots);
          for (const k in slots) {
            if (merged[k] && !merged[k].u && j[k]) {
              merged[k].u = typeof j[k] === 'string' ? j[k] : j[k].u;
            }
          }
          for (const id of tombstones) delete merged[id];
          slots = merged;
        }
        tombstones.clear();
      })
      .catch(() => {})
      .then(() => { loaded = true; subs.forEach((fn) => fn()); });
    return loadP;
  }

  let saving = false;
  let saveDirty = false;
  function save() {
    if (saving) { saveDirty = true; return; }
    const w = window.omelette && window.omelette.writeFile;
    if (!w) return;
    saving = true;
    Promise.resolve(w(STATE_FILE, JSON.stringify(slots)))
      .catch(() => {})
      .then(() => { saving = false; if (saveDirty) { saveDirty = false; save(); } });
  }

  const S_MAX = 5;
  const clampS = (s) => Math.max(1, Math.min(S_MAX, s));

  function getSlot(id) {
    const v = slots[id];
    if (!v) return null;
    return typeof v === 'string' ? { u: v, s: 1, x: 0, y: 0 } : v;
  }

  function setSlot(id, val) {
    if (!id) return;
    if (val) { slots[id] = val; tombstones.delete(id); }
    else { delete slots[id]; if (!loaded) tombstones.add(id); }
    subs.forEach((fn) => fn());
    if (loaded) save(); else load().then(save);
  }

  async function toDataUrl(file, targetW) {
    const bitmap = await createImageBitmap(file);
    try {
      const cap = Math.min(MAX_DIM, Math.max(1, Math.round(targetW * 2)) || MAX_DIM);
      const scale = Math.min(1, cap / Math.max(bitmap.width, bitmap.height));
      const w = Math.max(1, Math.round(bitmap.width * scale));
      const h = Math.max(1, Math.round(bitmap.height * scale));

function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

function TweaksPanel({ title = 'Tweaks', noDeckControls = false, children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const hasDeckStage = React.useMemo(
    () => typeof document !== 'undefined' && !!document.querySelector('deck-stage'),
    [],
  );
  const [railEnabled, setRailEnabled] = React.useState(
    () => hasDeckStage && !!document.querySelector('deck-stage')?._railEnabled,
  );
  React.useEffect(() => {
    if (!hasDeckStage || railEnabled) return undefined;
    const onMsg = (e) => {
      if (e.data && e.data.type === '__omelette_rail_enabled') setRailEnabled(true);
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [hasDeckStage, railEnabled]);
  const [railVisible, setRailVisible] = React.useState(() => {
    try { return localStorage.getItem('deck-stage.railVisible') !== '0'; } catch (e) { return true; }
  });
  const toggleRail = (on) => {
    setRailVisible(on);
    window.postMessage({ type: '__deck_rail_visible', on }, '*');
  };
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-noncommentable=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>&#x2715;</button>
        </div>
        <div className="twk-body">
          {children}
          {hasDeckStage && railEnabled && !noDeckControls && (
            <TweakSection label="Deck">
              <TweakToggle label="Thumbnail rail" value={railVisible} onChange={toggleRail} />
            </TweakSection>
          )}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {

function TweakRow({ label, value, children, inline = false }) {

        <span>{label}</span>

      </div>
      {children}
    </div>
  );
}

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {

      <input type="range" className="twk-slider" min={min} max={max} step={step}

    </TweakRow>

}

function TweakToggle({ label, value, onChange }) {

      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  const valueRef = React.useRef(value);
  valueRef.current = value;

  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

function useInView(options = {}) {
  const ref = React.useRef(null);
  const [isInView, setIsInView] = React.useState(false);
  React.useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(
      ([e]) => { if (e.isIntersecting) { setIsInView(true); if (!options.repeat) obs.unobserve(e.target); } },
      { threshold: options.threshold || 0.12, rootMargin: options.rootMargin || '0px' }
    );
    obs.observe(el);
    return () => obs.disconnect();
  }, []);
  return [ref, isInView];
}

function useTypingEffect(texts, speed = 90, deleteSpeed = 45, pause = 2200) {
  const [display, setDisplay] = React.useState('');
  const [idx, setIdx] = React.useState(0);
  const [deleting, setDeleting] = React.useState(false);
  React.useEffect(() => {
    const current = texts[idx];
    let timer;
    if (!deleting && display === current) {
      timer = setTimeout(() => setDeleting(true), pause);
    } else if (deleting && display === '') {
      setDeleting(false);
      setIdx((idx + 1) % texts.length);
    } else {
      timer = setTimeout(() => {
        setDisplay(deleting ? current.slice(0, display.length - 1) : current.slice(0, display.length + 1));
      }, deleting ? deleteSpeed : speed);
    }
    return () => clearTimeout(timer);
  }, [display, deleting, idx, texts]);
  return display;
}

function useScrollY() {
  const [y, setY] = React.useState(0);
  React.useEffect(() => {
    let ticking = false;
    const onScroll = () => {
      if (!ticking) { ticking = true; requestAnimationFrame(() => { setY(window.scrollY); ticking = false; }); }
    };
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);
  return y;
}

function AnimatedCounter({ target, suffix = '', duration = 2000 }) {
  const [ref, inView] = useInView();
  const [count, setCount] = React.useState(0);
  React.useEffect(() => {
    if (!inView) return;
    let start = 0;
    const step = target / (duration / 16);
    const timer = setInterval(() => {
      start += step;
      if (start >= target) { setCount(target); clearInterval(timer); }
      else setCount(Math.floor(start));
    }, 16);
    return () => clearInterval(timer);
  }, [inView, target, duration]);
  return <span ref={ref}>{count}{suffix}</span>;
}

  <script type="text/babel">
/* ── Accent Color Palettes (keyed by hex) ── */

const ACCENT_PALETTES = {
  '#d4a853': { primary: '#d4a853', secondary: '#e8c87a', glow: 'rgba(212,168,83,0.15)', glowStrong: 'rgba(212,168,83,0.35)' },
  '#5b8def': { primary: '#5b8def', secondary: '#7ba8f7', glow: 'rgba(91,141,239,0.15)', glowStrong: 'rgba(91,141,239,0.35)' },
  '#4ade80': { primary: '#4ade80', secondary: '#86efac', glow: 'rgba(74,222,128,0.15)', glowStrong: 'rgba(74,222,128,0.35)' },
  '#a78bfa': { primary: '#a78bfa', secondary: '#c4b5fd', glow: 'rgba(167,139,250,0.15)', glowStrong: 'rgba(167,139,250,0.35)' },
  '#ec6f5b': { primary: '#ec6f5b', secondary: '#f59e8a', glow: 'rgba(236,111,91,0.15)', glowStrong: 'rgba(236,111,91,0.35)' },
};

function resolveAccent(val) {
  if (!val) return ACCENT_PALETTES['#d4a853'];
  if (typeof val === 'object' && val !== null) {
    if (val.color && ACCENT_PALETTES[val.color]) return ACCENT_PALETTES[val.color];
  }
  return ACCENT_PALETTES[val] || ACCENT_PALETTES['#d4a853'];
}

/* ── Connected Dots Background (network rising) ── */

function ConnectedDotsBackground({ theme }) {
  const canvasRef = React.useRef(null);
  const mouseRef = React.useRef({ x: -1000, y: -1000 });

  React.useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let animId;
    const isMobile = window.innerWidth < 768;
    const DOT_COUNT = isMobile ? 50 : 110;
    const CONNECT_DIST = isMobile ? 110 : 140;
    let dots = [];

    const resize = () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
      dots = Array.from({ length: DOT_COUNT }, () => ({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        vy: -(0.15 + Math.random() * 0.45),
        vx: (Math.random() - 0.5) * 0.12,
        r: 0.8 + Math.random() * 1.6,
        phase: Math.random() * Math.PI * 2,
      }));
    };
    resize();
    window.addEventListener('resize', resize);

    const onMouse = (e) => { mouseRef.current = { x: e.clientX, y: e.clientY }; };
    window.addEventListener('mousemove', onMouse, { passive: true });

    const draw = (time) => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const accent = (getComputedStyle(document.documentElement).getPropertyValue('--accent-primary').trim() || '#d4a853').replace(/^#/, '');
      const r = parseInt(accent.slice(0, 2), 16);
      const g = parseInt(accent.slice(2, 4), 16);
      const b = parseInt(accent.slice(4, 6), 16);
      const isDark = theme === 'dark';
      const baseOpacity = isDark ? 0.55 : 0.42;
      const lineOpacity = isDark ? 0.12 : 0.16;

      dots.forEach((d) => {
        d.x += d.vx;
        d.y += d.vy;
        const mx = mouseRef.current.x - d.x;
        const my = mouseRef.current.y - d.y;
        const md = Math.sqrt(mx * mx + my * my);
        if (md < 130 && md > 0) {
          d.x -= (mx / md) * 0.6;
          d.y -= (my / md) * 0.6;
        }
        if (d.y < -10) { d.y = canvas.height + 10; d.x = Math.random() * canvas.width; }
        if (d.x < -10) d.x = canvas.width + 10;
        if (d.x > canvas.width + 10) d.x = -10;
      });

      ctx.lineWidth = 1;
      for (let i = 0; i < dots.length; i++) {
        for (let j = i + 1; j < dots.length; j++) {
          const dx = dots[i].x - dots[j].x;
          const dy = dots[i].y - dots[j].y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < CONNECT_DIST) {
            const alpha = (1 - dist / CONNECT_DIST) * lineOpacity;
            ctx.strokeStyle = `rgba(${r},${g},${b},${alpha})`;
            ctx.beginPath();
            ctx.moveTo(dots[i].x, dots[i].y);
            ctx.lineTo(dots[j].x, dots[j].y);
            ctx.stroke();
          }
        }
      }

      dots.forEach((d) => {
        const pulse = 0.7 + 0.3 * Math.sin(time * 0.002 + d.phase);
        ctx.fillStyle = `rgba(${r},${g},${b},${baseOpacity * pulse})`;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
        ctx.fill();
        const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, d.r * 4);
        grad.addColorStop(0, `rgba(${r},${g},${b},${0.15 * pulse})`);
        grad.addColorStop(1, 'transparent');
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.arc(d.x, d.y, d.r * 4, 0, Math.PI * 2);
        ctx.fill();
      });

      animId = requestAnimationFrame(draw);
    };
    animId = requestAnimationFrame(draw);

    return () => {
      cancelAnimationFrame(animId);
      window.removeEventListener('resize', resize);
      window.removeEventListener('mousemove', onMouse);
    };
  }, [theme]);

  return <canvas ref={canvasRef} className="grid-canvas" />;
}

function BackgroundLayer({ theme, bgEffect }) {
  if (bgEffect === 'aurora') {
    return <div className="aurora-bg"><div className="aurora-blob a1"></div><div className="aurora-blob a2"></div><div className="aurora-blob a3"></div></div>;
  }
  if (bgEffect === 'grid') {
    return (
      <div className="static-grid-bg">
        <div className="grid-glow g1"></div>
        <div className="grid-glow g2"></div>
        <div className="grid-glow g3"></div>
      </div>
    );
  }
  return <ConnectedDotsBackground theme={theme} />;
}

/* ── Custom Cursor ── */

function CustomCursor() {
  const dotRef = React.useRef(null);
  const ringRef = React.useRef(null);

  React.useEffect(() => {
    if (window.matchMedia('(pointer: coarse)').matches) return;
    let mouseX = -100, mouseY = -100;
    let ringX = -100, ringY = -100;
    let hovering = false;

    const onMove = (e) => {
      mouseX = e.clientX; mouseY = e.clientY;
      if (dotRef.current) {
        dotRef.current.style.transform = `translate(${mouseX}px, ${mouseY}px) translate(-50%, -50%)`;
      }
    };
    const animate = () => {
      ringX += (mouseX - ringX) * 0.32;
      ringY += (mouseY - ringY) * 0.32;
      if (ringRef.current) {
        ringRef.current.style.transform = `translate(${ringX}px, ${ringY}px) translate(-50%, -50%) scale(${hovering ? 1.8 : 1})`;
      }
      requestAnimationFrame(animate);
    };
    const onOver = (e) => {
      const t = e.target;
      hovering = !!(t.closest && (t.closest('a, button, .project-card, .timeline-card, .skill-category-card, .stat-card, .contact-item, .education-card, .cert-card, input, textarea, .nav-link, image-slot')));
      if (ringRef.current) ringRef.current.classList.toggle('hovering', hovering);
      if (dotRef.current) dotRef.current.classList.toggle('hovering', hovering);
    };
    const onDown = () => { ringRef.current?.classList.add('clicking'); };
    const onUp = () => { ringRef.current?.classList.remove('clicking'); };

    window.addEventListener('mousemove', onMove, { passive: true });
    window.addEventListener('mouseover', onOver, { passive: true });
    window.addEventListener('mousedown', onDown);
    window.addEventListener('mouseup', onUp);
    const raf = requestAnimationFrame(animate);
    return () => {
      window.removeEventListener('mousemove', onMove);
      window.removeEventListener('mouseover', onOver);
      window.removeEventListener('mousedown', onDown);
      window.removeEventListener('mouseup', onUp);
      cancelAnimationFrame(raf);
    };
  }, []);

  return (
    <>
      <div ref={dotRef} className="cursor-dot"></div>
      <div ref={ringRef} className="cursor-ring"></div>
    </>
  );
}

      </TweaksPanel>
    </>
  );
}

root.render(<App />);
